<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Login Kulu Asri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">

    <!-- Mockup Container (This is what you screenshot) -->
    <div class="w-full max-w-[1024px] h-[600px] bg-gray-100 rounded-xl shadow-sm border border-gray-200 flex items-center justify-center relative overflow-hidden">
        
        <!-- Header Text -->
        <div class="absolute top-8 left-8">
            <h2 class="text-xl font-bold text-gray-800">Rumah Makan Kulu Asri</h2>
            <p class="text-sm text-gray-500">Sistem Informasi Point of Sales</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-900 mb-2">Selamat Datang</h1>
                <p class="text-gray-500 text-sm">Silakan masuk menggunakan akun Anda</p>
            </div>

            <form>
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" value="admin@kuluasri.com" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-colors text-gray-700 bg-gray-50" readonly>
                </div>
                
                <div class="mb-8">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Kata Sandi</label>
                    <input type="password" value="********" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-colors text-gray-700 bg-gray-50" readonly>
                </div>

                <button type="button" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow-md">
                    Masuk ke Sistem
                </button>
            </form>
        </div>

    </div>

</body>
</html>
